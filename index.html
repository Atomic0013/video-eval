<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارزیابی گروهی ویدیوها</title>
    <style>
        :root {
            --bg: #0a0a14;
            --card: #13132b;
            --accent: #e94560;
            --green: #00ff88;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: var(--card);
            border-radius: 25px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px;
            width: 90%;
        }
        
        .login-box .icon { font-size: 4em; margin-bottom: 15px; }
        
        .login-box h2 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 2em;
        }
        
        .login-box .subtitle {
            color: #888;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .login-box .subtitle span { color: var(--green); font-weight: bold; }
        
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .input-group label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        
        .login-box input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1em;
            text-align: right;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn-join {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
        }
        
        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.5);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            background: linear-gradient(135deg, #e94560, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2em;
        }
        
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .status-badge {
            background: var(--card);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9em;
        }
        
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 5px;
        }
        
        .dot.online {
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        
        .dot.offline { background: #e94560; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .users-section {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .users-section h3 {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        
        .users-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .user-badge {
            background: rgba(233,69,96,0.12);
            padding: 8px 16px;
            border-radius: 25px;
            border: 1px solid rgba(233,69,96,0.25);
            font-size: 0.9em;
        }
        
        .user-badge.me {
            background: rgba(0,255,136,0.12);
            border-color: rgba(0,255,136,0.4);
        }
        
        .table-wrapper {
            overflow-x: auto;
            border-radius: 15px;
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        
        th {
            background: #1a1a3e;
            color: var(--accent);
            padding: 12px 8px;
            font-size: 0.85em;
            border: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        
        td {
            padding: 10px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 0.85em;
        }
        
        .video-name {
            background: rgba(233,69,96,0.06);
            text-align: right;
            padding-right: 15px;
            font-weight: bold;
            min-width: 220px;
            position: sticky;
            right: 0;
            z-index: 1;
        }
        
        .video-name small { color: #888; font-weight: normal; }
        
        select {
            width: 60px;
            padding: 8px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(20,20,50,0.9);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 1em;
        }
        
        select:hover { border-color: var(--accent); }
        
        .others-scores {
            font-size: 0.7em;
            color: #777;
            margin-top: 4px;
        }
        
        .user-score {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 1px;
        }
        
        .total-score {
            font-weight: bold;
            font-size: 1.2em;
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 25px;
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95em;
        }
        
        .btn-primary {
            background: #e94560;
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="icon">🎬</div>
            <h2>ارزیابی گروهی ویدیوها</h2>
            <p class="subtitle">
                👥 با دوستات <span>همزمان و زنده</span> ویدیوها رو ارزیابی کن
            </p>
            
            <div class="input-group">
                <label>👤 اسم تو</label>
                <input type="text" id="nameInput" placeholder="اسمت رو بنویس..." maxlength="25">
            </div>
            
            <div class="input-group">
                <label>🏷️ کد اتاق (فقط انگلیسی)</label>
                <input type="text" id="roomInput" placeholder="پیش‌فرض: general" maxlength="30" value="general">
            </div>
            
            <button class="btn-join" id="joinBtn">🚀 بزن بریم!</button>
        </div>
    </div>
    
    <div class="container" id="mainContent" style="display:none;">
        <div class="header">
            <h1>🎬 جدول ارزیابی اشتراکی</h1>
            <div class="status-bar">
                <div class="status-badge">
                    <span class="dot online" id="statusDot"></span>
                    <span id="statusText">در حال اتصال...</span>
                </div>
                <div class="status-badge">👤 <strong id="myNameDisplay">-</strong></div>
                <div class="status-badge">🏠 <strong id="roomDisplay">-</strong></div>
                <div class="status-badge">👥 <strong id="onlineCount">۰</strong> نفر</div>
            </div>
        </div>
        
        <div class="users-section">
            <h3>🟢 افراد آنلاین</h3>
            <div class="users-grid" id="usersGrid"></div>
        </div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ویدیو</th>
                        <th>🎯 ویرال</th>
                        <th>🤖 AI</th>
                        <th>💰 درآمد</th>
                        <th>💵 هزینه</th>
                        <th>📊 نمره من</th>
                        <th>📈 میانگین</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="btn-group">
            <button class="btn btn-primary" id="resetBtn">🔄 بازنشانی</button>
            <button class="btn btn-outline" id="copyBtn">📋 کپی لینک</button>
            <button class="btn btn-outline" id="leaveBtn">🚪 خروج</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ==========================================
        // اطلاعات Supabase شما
        // ==========================================
        const SUPABASE_URL = 'https://ztpwxbkqfwedwjhdoaad.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_uOeqK-C2dM7FqWU3W0Nv8w_lasTLuAa';
        
        console.log('🚀 Starting app...');
        console.log('🔗 URL:', SUPABASE_URL);
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log('✅ Supabase initialized');
        
        const videoNames = [
            "I Helped A Fan Go Viral",
            "Claude Code + YouTube = $62K/Month",
            "Copy-Pasting YouTube Shorts",
            "$101K with AI YouTube Automation",
            "Blew Up Channel in 24hrs with AI",
            "Viral AI Influencer Monetized",
            "Claude Code Changed YouTube"
        ];
        
        const videoCreators = ["Luc Boulch", "Danny Why", "Ollex", "adavia", "Jack Craig", "DIGITAL INCOME PROJECT", "Danny Why"];
        const factors = ['viral', 'automation', 'revenue', 'cost'];
        
        let currentUser = null;
        let currentRoom = 'general';
        let channel = null;
        let allScores = {};
        const onlineUsers = {};
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        
        async function joinRoom() {
            const name = document.getElementById('nameInput').value.trim();
            
            // اول چک می‌کنه ببینه توی URL پارامتر room هست یا نه
            const urlParams = new URLSearchParams(window.location.search);
            const urlRoom = urlParams.get('room');
            const room = urlRoom || document.getElementById('roomInput').value.trim() || 'general';
            
            // اگه از URL اومده، input رو هم آپدیت می‌کنه
            if (urlRoom) {
                document.getElementById('roomInput').value = urlRoom;
            }
            
            if (!name) {
                alert('❌ لطفاً اسمت رو وارد کن!');
                return;
            }
            
            console.log('👤 Joining as:', name, 'Room:', room);
            
            currentUser = name;
            currentRoom = room;
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('myNameDisplay').textContent = name;
            document.getElementById('roomDisplay').textContent = room;
            
            await loadExistingScores();
            subscribeToRealtime();
            onlineUsers[currentUser] = Date.now();
            buildTable();
            updateOnlineUsersDisplay();
            
            showToast('✅ خوش اومدی ' + name + '!');
        }
        
        async function loadExistingScores() {
            console.log('📥 Loading scores for room:', currentRoom);
            const { data, error } = await supabaseClient
                .from('scores')
                .select('*')
                .eq('room_id', currentRoom);
            
            if (error) {
                console.error('❌ Load error:', error);
                return;
            }
            
            console.log('✅ Loaded', data.length, 'scores');
            
            data.forEach(row => {
                if (!allScores[row.user_name]) allScores[row.user_name] = {};
                if (!allScores[row.user_name][row.video_index]) allScores[row.user_name][row.video_index] = {};
                allScores[row.user_name][row.video_index][row.factor] = row.score;
            });
        }
        
        function subscribeToRealtime() {
            console.log('🔄 Subscribing to realtime for room:', currentRoom);
            channel = supabaseClient
                .channel(`room:${currentRoom}`)
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'scores', filter: `room_id=eq.${currentRoom}` },
                    (payload) => {
                        console.log('📡 Update:', payload.eventType);
                        if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
                            const row = payload.new;
                            if (!allScores[row.user_name]) allScores[row.user_name] = {};
                            if (!allScores[row.user_name][row.video_index]) allScores[row.user_name][row.video_index] = {};
                            allScores[row.user_name][row.video_index][row.factor] = row.score;
                            updateMyScores();
                        }
                    }
                )
                .subscribe((status) => {
                    console.log('📡 Status:', status);
                    const dot = document.getElementById('statusDot');
                    const text = document.getElementById('statusText');
                    if (status === 'SUBSCRIBED') {
                        dot.className = 'dot online';
                        text.textContent = 'متصل و همگام‌سازی شده';
                    }
                });
        }
        
        function buildTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            videoNames.forEach((name, idx) => {
                const row = document.createElement('tr');
                
                const nameCell = document.createElement('td');
                nameCell.className = 'video-name';
                nameCell.innerHTML = `<strong>${idx+1}.</strong> ${name}<br><small>👤 ${videoCreators[idx]}</small>`;
                row.appendChild(nameCell);
                
                factors.forEach(factor => {
                    const td = document.createElement('td');
                    
                    const select = document.createElement('select');
                    select.setAttribute('data-video', idx);
                    select.setAttribute('data-factor', factor);
                    select.addEventListener('change', function() {
                        submitScore(idx, factor, parseInt(this.value));
                    });
                    
                    for (let i = 1; i <= 5; i++) {
                        const opt = document.createElement('option');
                        opt.value = i;
                        opt.textContent = i;
                        if (i === 3) opt.selected = true;
                        select.appendChild(opt);
                    }
                    
                    td.appendChild(select);
                    
                    const othersDiv = document.createElement('div');
                    othersDiv.className = 'others-scores';
                    othersDiv.id = `others-${idx}-${factor}`;
                    td.appendChild(othersDiv);
                    
                    row.appendChild(td);
                });
                
                const totalCell = document.createElement('td');
                totalCell.id = `my-total-${idx}`;
                totalCell.innerHTML = '<span class="total-score">۱۲</span>';
                row.appendChild(totalCell);
                
                const avgCell = document.createElement('td');
                avgCell.id = `avg-${idx}`;
                avgCell.textContent = '-';
                row.appendChild(avgCell);
                
                tbody.appendChild(row);
            });
            
            updateMyScores();
        }
        
        async function submitScore(videoIndex, factor, value) {
            if (!currentUser) return;
            
            console.log('💾 Saving:', { videoIndex, factor, value, room: currentRoom });
            
            const { error } = await supabaseClient
                .from('scores')
                .upsert({
                    room_id: currentRoom,
                    user_name: currentUser,
                    video_index: videoIndex,
                    factor: factor,
                    score: value,
                    updated_at: new Date()
                }, { onConflict: 'room_id, user_name, video_index, factor' });
            
            if (error) {
                console.error('❌ Save error:', error);
            } else {
                console.log('✅ Saved!');
            }
        }
        
        function updateMyScores() {
            if (!currentUser) return;
            
            videoNames.forEach((_, idx) => {
                let myTotal = 0;
                
                factors.forEach(factor => {
                    const select = document.querySelector(`select[data-video="${idx}"][data-factor="${factor}"]`);
                    const othersDiv = document.getElementById(`others-${idx}-${factor}`);
                    
                    const myScore = (allScores[currentUser] && allScores[currentUser][idx] && allScores[currentUser][idx][factor]) || 3;
                    
                    if (select && parseInt(select.value) !== myScore) {
                        select.value = myScore;
                    }
                    
                    myTotal += myScore;
                    
                    const othersHtml = [];
                    Object.keys(allScores).forEach(user => {
                        if (user !== currentUser && allScores[user][idx] && allScores[user][idx][factor]) {
                            othersHtml.push(`<span class="user-score">${user}: ${allScores[user][idx][factor]}</span>`);
                        }
                    });
                    
                    if (othersDiv) othersDiv.innerHTML = othersHtml.join(' ');
                });
                
                const totalCell = document.getElementById(`my-total-${idx}`);
                if (totalCell) {
                    let color = myTotal >= 16 ? '#00ff88' : myTotal >= 12 ? '#ffdd57' : '#e94560';
                    totalCell.innerHTML = `<span class="total-score" style="color:${color}">${myTotal}</span>`;
                }
                
                const avgCell = document.getElementById(`avg-${idx}`);
                if (avgCell) {
                    let totalSum = 0, count = 0;
                    Object.keys(allScores).forEach(user => {
                        if (allScores[user][idx]) {
                            let userTotal = 0, hasAll = true;
                            factors.forEach(factor => {
                                if (allScores[user][idx][factor]) userTotal += allScores[user][idx][factor];
                                else hasAll = false;
                            });
                            if (hasAll) { totalSum += userTotal; count++; }
                        }
                    });
                    
                    if (count > 0) {
                        const avg = (totalSum / count).toFixed(1);
                        let color = avg >= 16 ? '#00ff88' : avg >= 12 ? '#ffdd57' : '#e94560';
                        avgCell.innerHTML = `<span style="color:${color};font-size:1.2em;">${avg}</span><br><small style="color:#888;">${count} نفر</small>`;
                    }
                }
            });
        }
        
        function updateOnlineUsersDisplay() {
            const users = Object.keys(onlineUsers);
            document.getElementById('onlineCount').textContent = users.length;
            document.getElementById('usersGrid').innerHTML = users.map(user => {
                const isMe = user === currentUser;
                return `<div class="user-badge ${isMe ? 'me' : ''}"><span style="color:#00ff88;">●</span> ${user} ${isMe ? '(شما)' : ''}</div>`;
            }).join('');
        }
        
        async function resetMyScores() {
            if (!confirm('مطمئنی می‌خوای نمره‌هات رو به ۳ برگردونی؟')) return;
            for (let idx = 0; idx < videoNames.length; idx++) {
                for (const factor of factors) {
                    await supabaseClient.from('scores').upsert({
                        room_id: currentRoom, user_name: currentUser, video_index: idx,
                        factor: factor, score: 3, updated_at: new Date()
                    }, { onConflict: 'room_id, user_name, video_index, factor' });
                }
            }
            showToast('✅ بازنشانی شد');
        }
        
        function copyRoomLink() {
            const url = new URL(window.location.href);
            url.searchParams.set('room', currentRoom);
            navigator.clipboard.writeText(url.toString()).then(() => {
                showToast('📋 لینک اتاق کپی شد! برای دوستات بفرس');
            });
        }
        
        function leaveRoom() {
            if (channel) supabaseClient.removeChannel(channel);
            delete onlineUsers[currentUser];
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
            currentUser = null;
        }
        
        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('joinBtn').addEventListener('click', joinRoom);
            document.getElementById('resetBtn').addEventListener('click', resetMyScores);
            document.getElementById('copyBtn').addEventListener('click', copyRoomLink);
            document.getElementById('leaveBtn').addEventListener('click', leaveRoom);
            
            document.getElementById('nameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') joinRoom();
            });
            
            // اگه توی URL پارامتر room بود، input رو از قبل پر کن
            const urlParams = new URLSearchParams(window.location.search);
            const urlRoom = urlParams.get('room');
            if (urlRoom) {
                document.getElementById('roomInput').value = urlRoom;
            }
        });
    </script>
</body>
</html>
